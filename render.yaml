services:
  - type: web
    name: crop-yield
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.20
      - key: FLASK_SECRET_KEY
        generateValue: true
